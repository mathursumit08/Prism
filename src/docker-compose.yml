services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monorepo_api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:Vectordbm1@postgres:5432/monorepo_db
      FORECAST_SPARSE_DEALER_MONTH_THRESHOLD: 6
      JWT_ACCESS_SECRET: prism-docker-access-secret-change-me
      JWT_REFRESH_SECRET: prism-docker-refresh-secret-change-me
      JWT_ACCESS_TTL_SECONDS: 900
      JWT_REFRESH_TTL_SECONDS: 604800
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  forecast-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monorepo_forecast_worker
    restart: unless-stopped
    command: ["npm", "run", "worker:forecast"]
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:Vectordbm1@postgres:5432/monorepo_db
      FORECAST_HORIZON_MONTHS: 24
      FORECAST_SPARSE_DEALER_MONTH_THRESHOLD: 6
      TZ: Asia/Kolkata
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: monorepo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monorepo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Vectordbm1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monorepo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
